services:
  - type: web
    name: hacker-news-feed
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # External Postgres (Neon). Set the value in the Render dashboard;
      # sync: false keeps the secret out of source control.
      - key: DATABASE_URL
        sync: false
