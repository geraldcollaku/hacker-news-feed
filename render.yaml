services:
  - type: web
    name: hacker-news-feed
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hacker-news-db
          property: connectionString

databases:
  - name: hacker-news-db
    databaseName: hackernews
    plan: free
